<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>A-Frame: Tap to Place Ground</title>
  <meta itemprop="name" content="A-Frame: Tap to Place Ground">
  <meta name="twitter:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:title" content="A-Frame: Tap to Place Ground">
  <meta property="og:site_name" content="A-Frame: Tap to Place Ground">
  <meta name="description" content="This example spawns almonds around the user and supports click or touch interactions with popup feedback. Showcases spawning objects and importing a 3D model.">
  <meta itemprop="description" content="This example spawns almonds around the user and supports click or touch interactions with popup feedback. Showcases spawning objects and importing a 3D model.">
  <meta property="og:description" content="This example spawns almonds around the user and supports click or touch interactions with popup feedback. Showcases spawning objects and importing a 3D model.">
  <meta name="twitter:description" content="This example spawns almonds around the user and supports click or touch interactions with popup feedback. Showcases spawning objects and importing a 3D model.">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  

<!-- Copyright (c) 2024 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.5.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Add GIF for sharing -->
<meta property="og:image" content="https://i.giphy.com/media/rAi32DNlsWNpItOpDr/giphy.gif"/>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<div id="loadingScreen" class="loading-screen" aria-live="polite" aria-busy="true">
  <img class="loading-logo" src="./logoM.png" alt="Logo">
  <div class="loading-spinner" aria-hidden="true"></div>
  <p class="loading-label">Loading experience...</p>
</div>

<div class="over">
  <span id="promptText">Tap To Place Model</span>
  <span id="scoreText" aria-label="Score">Score: 0</span>
</div>

<div id="almondPopup" class="popup hidden" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
  <div class="popup-card">
    <h2 id="popupTitle">Nice click!</h2>
    <p>You clicked the almond successfully.</p>
    <button id="popupOkBtn" type="button">OK</button>
  </div>
</div>

<!-- Add the entity-swapner component to the scene so it has an effect -->
<a-scene
  xrextras-gesture-detector
  entity-swapner
  landing-page
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="
    allowedDevices: any;
    defaultEnvironmentFogIntensity: 0.5; 
    defaultEnvironmentFloorTexture: #groundTex; 
    defaultEnvironmentFloorColor: #FFF;
    defaultEnvironmentSkyBottomColor: #B4C4CC; 
    defaultEnvironmentSkyTopColor: #5ac8fa;
    defaultEnvironmentSkyGradientStrength: 0.5;">

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <img id="groundTex" crossorigin="anonymous" src="">
    <img id="glowTex" crossorigin="anonymous" src="./Ellipse.png">
    <img id="glowTexYellow" crossorigin="anonymous" src="./Ellipse-yellow.png">
    <a-asset-item id="almondModel" crossorigin="anonymous" src="./almond.glb"></a-asset-item>
    <video
      id="alpha-video"
      muted
      autoplay
      playsinline
      crossorigin="anonymous"
      loop="true"
      src="./2.mp4#t=0.001">
    </video>
    <video
      id="sparkle-video"
      muted
      autoplay
      playsinline
      crossorigin="anonymous"
      loop="true"
      src="./sparkles.mp4#t=0.001">
    </video>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="
      fuse: false;
      rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 40;
      shadowCameraBottom: -40;
      shadowCameraRight: 40;
      shadowCameraLeft: -40;
      target: #camera"
    xrextras-attach="target: camera; offset: 8 15 4"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- Adding the cantap class allows the ground to be clicked -->
  <!-- <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -0.99 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box> -->
</a-scene>

</body>

</html>
